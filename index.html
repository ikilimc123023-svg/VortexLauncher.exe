<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>VortexLauncher İndir</title>
    <style>
        body {
            background-color: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        .btn-rgb {
            position: relative;
            padding: 20px 50px;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-transform: uppercase;
            text-decoration: none;
            background: #111;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            z-index: 1;
            overflow: hidden;
            transition: 0.3s;
        }

        /* RGB Parlama Efekti */
        .btn-rgb::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            z-index: -1;
            background: linear-gradient(90deg, #ff0000, #ffeb3b, #4caf50, #2196f3, #ff0000);
            background-size: 400%;
            border-radius: 50px;
            opacity: 0;
            transition: 0.5s;
            animation: moveRgb 8s linear infinite;
        }

        /* Mouse üzerine gelince parlasın */
        .btn-rgb:hover::before {
            opacity: 1;
            filter: blur(20px);
        }

        .btn-rgb:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        /* Tıklama efekti */
        .btn-rgb:active {
            transform: scale(0.95);
        }

        @keyframes moveRgb {
            0% { background-position: 0%; }
            100% { background-position: 400%; }
        }
    </style>
</head>
<body>

    <a href="VortexLauncher.exe" class="btn-rgb" download>İNDİR</a>

</body>
</html>
